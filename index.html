<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Password Checker TWA</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            background-color: var(--tg-theme-secondary-bg-color, #f8f9fa);
            color: var(--tg-theme-text-color, #212529);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            transition: all 0.3s ease;
        }
        .card {
            background-color: var(--tg-theme-bg-color, #ffffff);
            border: none;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .progress {
            height: 10px;
            border-radius: 5px;
        }
        .hint-item {
            font-size: 0.9rem;
            transition: color 0.3s ease;
        }
        .btn-primary {
            background-color: var(--tg-theme-button-color, #0088cc);
            border: none;
            padding: 12px;
            font-weight: 600;
        }
        .btn-outline-secondary {
            color: var(--tg-theme-button-color, #0088cc);
            border-color: var(--tg-theme-button-color, #0088cc);
        }
    </style>
</head>
<body class="p-3">

<div class="container-fluid">
    <div class="card p-4">
        <h4 class="text-center mb-4">🛡 Проверка пароля</h4>
        
        <div class="mb-3">
            <label class="form-label">Введите ваш пароль</label>
            <div class="input-group">
                <input type="password" id="pass-input" class="form-control" placeholder="••••••••">
                <button class="btn btn-outline-secondary" type="button" id="toggle-pass">👁</button>
            </div>
        </div>

        <div class="progress mb-2">
            <div id="strength-bar" class="progress-bar" role="progressbar" style="width: 0%"></div>
        </div>
        <p class="text-center fw-bold mb-3" id="strength-text">Пусто</p>

        <div id="hints" class="mb-4">
            <div id="len" class="hint-item text-danger">● Минимум 8 символов</div>
            <div id="upper" class="hint-item text-danger">● Есть заглавная буква</div>
            <div id="num" class="hint-item text-danger">● Есть цифра</div>
            <div id="spec" class="hint-item text-danger">● Есть спецсимвол (!@#$)</div>
        </div>

        <div class="d-grid gap-2">
            <button id="gen-btn" class="btn btn-outline-primary btn-sm">Сгенерировать надежный</button>
            <button id="send-btn" class="btn btn-primary" style="display: none;">Отправить отчет боту</button>
        </div>
    </div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    const passInput = document.getElementById('pass-input');
    const strengthBar = document.getElementById('strength-bar');
    const strengthText = document.getElementById('strength-text');
    const sendBtn = document.getElementById('send-btn');
    const toggleBtn = document.getElementById('toggle-pass');

    // 1. Показать/скрыть пароль
    toggleBtn.addEventListener('click', () => {
        passInput.type = passInput.type === 'password' ? 'text' : 'password';
    });

    // 2. Логика проверки
    passInput.addEventListener('input', () => {
        const val = passInput.value;
        let score = 0;

        const criteria = {
            len: val.length >= 8,
            upper: /[A-ZА-Я]/.test(val),
            num: /[0-9]/.test(val),
            spec: /[!@#$%^&*]/.test(val)
        };

        // Обновляем визуальные подсказки
        Object.keys(criteria).forEach(key => {
            const el = document.getElementById(key);
            if (criteria[key]) {
                el.classList.replace('text-danger', 'text-success');
                el.innerText = el.innerText.replace('●', '✓');
                score++;
            } else {
                el.classList.replace('text-success', 'text-danger');
                el.innerText = el.innerText.replace('✓', '●');
            }
        });

        // Обновляем прогресс-бар
        const percent = (score / 4) * 100;
        strengthBar.style.width = percent + '%';
        
        const config = [
            { text: "Очень слабый", color: "bg-danger" },
            { text: "Слабый", color: "bg-warning" },
            { text: "Средний", color: "bg-info" },
            { text: "Надежный", color: "bg-primary" },
            { text: "Идеальный!", color: "bg-success" }
        ];

        strengthBar.className = "progress-bar " + config[score].color;
        strengthText.innerText = config[score].text;
        strengthText.style.color = getComputedStyle(document.querySelector('.' + config[score].color)).backgroundColor;

        sendBtn.style.display = score >= 3 ? "block" : "none";
    });

    // 3. Генератор паролей
    document.getElementById('gen-btn').addEventListener('click', () => {
        const charset = "abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789!@#$%^&*";
        let retVal = "";
        for (let i = 0; i < 12; ++i) {
            retVal += charset.charAt(Math.floor(Math.random() * charset.length));
        }
        passInput.value = retVal;
        passInput.dispatchEvent(new Event('input')); // Триггерим проверку
    });

    // 4. Отправка данных боту
    sendBtn.addEventListener('click', () => {
        const data = {
            score: strengthText.innerText,
            timestamp: new Date().toLocaleTimeString()
        };
        tg.sendData(JSON.stringify(data));
    });
</script>

</body>
</html>
